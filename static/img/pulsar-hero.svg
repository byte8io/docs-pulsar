<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for main circle -->
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>

    <!-- Radial gradient for center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </radialGradient>

    <!-- Pulse rings gradient -->
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Outer pulse rings -->
  <circle cx="80" cy="80" r="75" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.2">
    <animate attributeName="r" values="60;75;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="80" cy="80" r="65" stroke="#A78BFA" stroke-width="1" fill="none" opacity="0.3">
    <animate attributeName="r" values="55;65;55" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Main circle -->
  <circle cx="80" cy="80" r="50" fill="url(#circleGradient)" filter="url(#glow)"/>

  <!-- Center glow -->
  <circle cx="80" cy="80" r="35" fill="url(#centerGlow)"/>

  <!-- Stylized P with pulse wave -->
  <g fill="white" filter="url(#glow)">
    <!-- P stem -->
    <path d="M60 55h8v50h-8z" fill-opacity="0.9"/>

    <!-- P curve top -->
    <path d="M68 55h15c11 0 17 6 17 15s-6 15-17 15H68V77h15c5 0 9-3 9-7s-4-7-9-7H68V55z" fill-opacity="0.9"/>

    <!-- Pulse wave emanating from P -->
    <path d="M92 70h8l4-8 6 16 6-16 4 8h10" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Small orbiting dots -->
  <circle cx="80" cy="25" r="4" fill="#C4B5FD">
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="80" cy="135" r="3" fill="#A78BFA" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="180 80 80" to="540 80 80" dur="12s" repeatCount="indefinite"/>
  </circle>
</svg>
